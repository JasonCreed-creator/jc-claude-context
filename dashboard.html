<!DOCTYPE html>
<!--
  M&C 신사업실 주간회의록 대시보드 — Standalone Single File
  · 더블클릭만으로 브라우저에서 열림 (file://)
  · 외부 자원: Pretendard 폰트 (CDN, 오프라인이어도 폴백 정상)
  · 시트 ID를 STANDALONE_CONFIG.sheet.id에 입력하면 구글시트 30초 폴링
  · 시트 미연결 시 STANDALONE_SAMPLE의 더미 회의록 3건으로 데모 동작
-->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M&amp;C 신사업실 주간회의록</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
:root {
  --bg: #FFFFFF;
  --bg-elev: #F9FAFB;
  --bg-card: #F3F4F6;
  --border: #E5E7EB;
  --text: #0F1419;
  --text-muted: #6B7280;
  --accent: #1A56DB;
  --accent-soft: #DBEAFE;
  --success: #059669;
  --warning: #D97706;
  --danger: #DC2626;
  --shadow: 0 1px 2px rgba(15, 20, 25, 0.04), 0 1px 3px rgba(15, 20, 25, 0.06);
  --radius: 12px;
  --radius-sm: 8px;
  --gap-1: 8px;
  --gap-2: 16px;
  --gap-3: 24px;
  --gap-4: 32px;
  --font:
    "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
    "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
}
[data-theme="dark"] {
  --bg: #0B0F19;
  --bg-elev: #111827;
  --bg-card: #1F2937;
  --border: #374151;
  --text: #E5E7EB;
  --text-muted: #9CA3AF;
  --accent: #60A5FA;
  --accent-soft: #1E3A8A;
  --success: #34D399;
  --warning: #FBBF24;
  --danger: #F87171;
  --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.5);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.55;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--gap-2);
  padding: var(--gap-2) var(--gap-3);
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.topbar__left { display: flex; align-items: baseline; gap: var(--gap-2); flex-wrap: wrap; }
.topbar__right { display: flex; align-items: center; gap: var(--gap-1); flex-wrap: wrap; }
.brand { margin: 0; display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; }
.brand__mark { background: var(--accent); color: #FFFFFF; padding: 4px 8px; border-radius: 6px; font-size: 14px; letter-spacing: 0.5px; }
.brand__title { font-weight: 700; }
.brand__sub { color: var(--text-muted); font-size: 13px; transition: color 0.3s ease; }
.brand__sub.is-pulse { color: var(--accent); animation: pulse 0.6s ease; }
@keyframes pulse { 0% { opacity: 1; } 40% { opacity: 0.4; } 100% { opacity: 1; } }
.control {
  height: 36px; padding: 0 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 14px;
  outline: none; transition: border-color 0.15s ease;
}
.control:focus { border-color: var(--accent); }
#search-input { min-width: 200px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 36px; padding: 0 14px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; font-family: var(--font);
  text-decoration: none; border: 1px solid transparent;
  cursor: pointer;
  transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.05s ease;
}
.btn:active { transform: translateY(1px); }
.btn--primary { background: var(--accent); color: #FFFFFF; }
.btn--primary:hover { filter: brightness(1.08); }
.btn--ghost { background: transparent; color: var(--text); border-color: var(--border); }
.btn--ghost:hover { background: var(--bg-card); }
.btn--icon { width: 36px; padding: 0; background: transparent; border-color: var(--border); font-size: 16px; }
.btn--sm { height: 28px; padding: 0 10px; font-size: 12px; }
.kpis {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: var(--gap-2); padding: var(--gap-3); background: var(--bg);
}
.kpi {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: var(--gap-2); display: flex; flex-direction: column; gap: 4px;
  box-shadow: var(--shadow);
}
.kpi__label { color: var(--text-muted); font-size: 13px; font-weight: 500; }
.kpi__value { font-size: 32px; font-weight: 700; line-height: 1.1; color: var(--text); }
.kpi__unit { color: var(--text-muted); font-size: 12px; }
.kpi__value-row { display: flex; align-items: baseline; gap: 4px; }
.kpi--alert .kpi__value { color: var(--warning); }
.kpi--with-bar .kpi__value-row .kpi__unit { font-size: 14px; font-weight: 600; }
.progress {
  width: 100%; height: 6px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 999px; overflow: hidden; margin-top: 4px;
}
.progress__fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--success));
  border-radius: 999px; transition: width 0.4s ease;
}
.filters { padding: 0 var(--gap-3) var(--gap-2); display: flex; flex-direction: column; gap: 6px; }
.filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.filter-row__label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; min-width: 54px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.tag--department { background: var(--success); color: #FFFFFF; border-color: transparent; }
.meeting-group {
  padding: 8px 12px; margin: 12px 4px 4px;
  font-size: 11px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  border-top: 1px solid var(--border);
}
.meeting-group:first-child { margin-top: 0; border-top: none; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 12px;
  border: 1px solid var(--border); border-radius: 999px;
  background: var(--bg); color: var(--text);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.15s ease;
}
.chip:hover { background: var(--bg-card); }
.chip[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.chip__count { color: var(--text-muted); font-size: 12px; }
.chip[aria-pressed="true"] .chip__count { color: var(--accent); }
.content {
  flex: 1; display: grid; grid-template-columns: 380px 1fr;
  gap: var(--gap-2); padding: 0 var(--gap-3) var(--gap-3);
  min-height: 0;
}
.list-panel {
  background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
  display: flex; flex-direction: column; overflow: hidden;
}
.list-panel__head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px var(--gap-2); border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--text-muted);
}
.meeting-list { list-style: none; margin: 0; padding: 8px; overflow-y: auto; max-height: 70vh; }
.meeting-item {
  display: flex; flex-direction: column; gap: 4px;
  padding: 12px; border-radius: var(--radius-sm);
  cursor: pointer; border: 1px solid transparent; margin-bottom: 4px;
  transition: background-color 0.12s ease, border-color 0.12s ease;
}
.meeting-item:hover { background: var(--bg-card); }
.meeting-item[aria-selected="true"] { background: var(--accent-soft); border-color: var(--accent); }
.meeting-item__row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.meeting-item__title { font-weight: 600; font-size: 14px; color: var(--text); }
.meeting-item__date { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
.meeting-item__meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag {
  display: inline-block; padding: 2px 8px;
  border-radius: 999px; font-size: 11px; font-weight: 600;
  background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border);
}
.tag--project { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
.tag--author { background: transparent; }
.tag--today { background: var(--success); color: #FFFFFF; border-color: transparent; }
.tag--week { background: var(--warning); color: #FFFFFF; border-color: transparent; }
.meeting-item--today { border-left: 3px solid var(--success); padding-left: 9px; }
.meeting-item--this-week { border-left: 3px solid var(--warning); padding-left: 9px; }
.empty { padding: var(--gap-3); text-align: center; color: var(--text-muted); font-size: 14px; }
.detail-panel {
  background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; display: flex; flex-direction: column;
}
.detail-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; color: var(--text-muted); gap: var(--gap-2); padding: var(--gap-4); text-align: center;
}
.detail-empty__icon { font-size: 48px; opacity: 0.6; }
.detail { padding: var(--gap-3); overflow-y: auto; max-height: 75vh; }
.detail__head { margin-bottom: var(--gap-2); padding-bottom: var(--gap-2); border-bottom: 1px solid var(--border); }
.detail__title { font-size: 22px; font-weight: 700; margin: 0 0 8px; color: var(--text); }
.detail__meta { display: flex; flex-wrap: wrap; gap: 8px; color: var(--text-muted); font-size: 13px; }
.detail__section { margin-top: var(--gap-3); }
.detail__section h2 {
  font-size: 14px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 var(--gap-1);
}
.detail__body { font-size: 15px; color: var(--text); }
.detail__body h1, .detail__body h2, .detail__body h3 { margin: var(--gap-2) 0 8px; line-height: 1.3; color: var(--text); }
.detail__body h1 { font-size: 20px; }
.detail__body h2 { font-size: 17px; }
.detail__body h3 { font-size: 15px; }
.detail__body p { margin: 8px 0; }
.detail__body ul, .detail__body ol { margin: 8px 0; padding-left: 24px; }
.detail__body li { margin: 4px 0; }
.detail__body code {
  background: var(--bg-card); padding: 2px 6px; border-radius: 4px;
  font-size: 0.9em; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.detail__body pre { background: var(--bg-card); padding: 12px; border-radius: var(--radius-sm); overflow-x: auto; }
.detail__body blockquote {
  margin: 8px 0; padding: 8px 12px;
  border-left: 3px solid var(--accent); background: var(--bg-card); color: var(--text-muted);
}
.detail__body a { color: var(--accent); text-decoration: underline; }
.detail__body strong { font-weight: 700; }
.detail__body .task-list { list-style: none; padding-left: 0; }
.detail__body .task-list li { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; }
.detail__body .task-checkbox {
  flex-shrink: 0; margin-top: 4px;
  width: 16px; height: 16px;
  border: 1.5px solid var(--border); border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.detail__body .task-checkbox--done {
  background: var(--success); border-color: var(--success);
  color: #FFFFFF; font-size: 11px; font-weight: 700;
}
.detail__body .task-checkbox--done + .task-text { color: var(--text-muted); text-decoration: line-through; }
.footer {
  padding: var(--gap-2) var(--gap-3);
  display: flex; justify-content: space-between;
  border-top: 1px solid var(--border); background: var(--bg-elev);
  color: var(--text-muted); font-size: 12px;
}
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--text); color: var(--bg);
  padding: 10px 16px; border-radius: var(--radius-sm);
  font-size: 13px; box-shadow: var(--shadow); z-index: 100;
}
.loading-overlay {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: var(--gap-2); flex: 1; padding: var(--gap-4); color: var(--text-muted);
}
.loading-overlay[aria-hidden="true"] { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-banner {
  display: flex; align-items: center; gap: var(--gap-1);
  margin: 0 var(--gap-3) var(--gap-2);
  padding: 10px 14px;
  background: rgba(220, 38, 38, 0.08); border: 1px solid var(--danger);
  border-radius: var(--radius-sm); color: var(--danger); font-size: 13px;
}
.error-banner__icon { font-size: 16px; }
.error-banner__msg { flex: 1; }
.detail-back { display: none; margin: var(--gap-1); align-self: flex-start; }
.detail__actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

/* ---------- Detail Dashboard Widgets ---------- */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--gap-2);
  margin-top: var(--gap-2);
}
.widget {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: var(--gap-2);
  box-shadow: var(--shadow); display: flex; flex-direction: column;
}
.widget--span2 { grid-column: span 2; }
.widget--span4 { grid-column: span 4; }
.widget__head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.widget__icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-soft); color: var(--accent); font-size: 14px; flex-shrink: 0;
}
.widget__icon--green { background: rgba(5,150,105,0.12); color: var(--success); }
.widget__icon--amber { background: rgba(217,119,6,0.12); color: var(--warning); }
.widget__icon--red { background: rgba(220,38,38,0.12); color: var(--danger); }
.widget__icon--gray { background: var(--bg-card); color: var(--text-muted); }
.widget__title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.widget__value { font-size: 28px; font-weight: 800; line-height: 1.1; color: var(--text); }
.widget__sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.widget__body { font-size: 14px; color: var(--text); flex: 1; }

.action-list { list-style: none; padding: 0; margin: 0; }
.action-list li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  border: 1px solid transparent;
  transition: background-color 0.12s ease, border-color 0.12s ease;
}
.action-list li:hover { background: var(--bg-card); }
.action-list .task-checkbox {
  cursor: pointer; flex-shrink: 0; margin-top: 2px;
  width: 18px; height: 18px;
  border: 1.5px solid var(--border); border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg); font-size: 12px;
}
.action-list .task-checkbox--done {
  background: var(--success); border-color: var(--success);
  color: #FFFFFF; font-weight: 700;
}
.action-list .task-text { flex: 1; line-height: 1.4; }
.action-list li.is-done .task-text { color: var(--text-muted); text-decoration: line-through; }
.action-list .task-meta { font-size: 11px; color: var(--text-muted); margin-left: 4px; }

.donut {
  --p: 0;
  width: 64px; height: 64px; border-radius: 50%;
  background: conic-gradient(var(--success) calc(var(--p) * 1%), var(--bg-card) 0);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.donut::after {
  content: ''; position: absolute; inset: 6px;
  background: var(--bg); border-radius: 50%;
}
.donut__num {
  position: relative; z-index: 1;
  font-size: 14px; font-weight: 700; color: var(--text);
}
.donut-row { display: flex; align-items: center; gap: 12px; }

.attendee-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 999px;
  background: var(--bg-card); color: var(--text);
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--border);
}
.attendee-list { display: flex; flex-wrap: wrap; gap: 6px; }

.section-card {
  background: var(--bg-card); border-radius: var(--radius-sm);
  padding: 12px; font-size: 14px;
}
.next-meeting {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--accent-soft); color: var(--accent);
  border-radius: var(--radius-sm); font-weight: 600;
}
.next-meeting__icon { font-size: 18px; }

/* ---------- Modal ---------- */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: var(--gap-2);
}
.modal-overlay[hidden] { display: none !important; }
.modal {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  width: 100%; max-width: 720px; max-height: 90vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal__head {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--gap-2) var(--gap-3); border-bottom: 1px solid var(--border);
}
.modal__title { margin: 0; font-size: 18px; font-weight: 700; }
.modal__close {
  background: transparent; border: none;
  font-size: 22px; color: var(--text-muted);
  cursor: pointer; line-height: 1; padding: 4px 8px;
}
.modal__body { padding: var(--gap-3); overflow-y: auto; flex: 1; }
.modal__foot {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: var(--gap-2) var(--gap-3); border-top: 1px solid var(--border); background: var(--bg-elev);
}
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: var(--gap-2); }
.field__row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-2); }
.field__label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.field__hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 14px;
  outline: none; transition: border-color 0.15s ease;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { min-height: 80px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
.field textarea.field__actions { min-height: 100px; }

@media (max-width: 960px) {
  .kpis { grid-template-columns: repeat(2, 1fr); }
  .content { grid-template-columns: 1fr; }
  .detail-panel { display: none; }
  .detail-panel.is-visible { display: flex; position: fixed; inset: 0; z-index: 50; border-radius: 0; }
  .detail-panel.is-visible .detail-back { display: inline-flex; }
  .list-panel.is-hidden { display: none; }
  .topbar { padding: var(--gap-1) var(--gap-2); }
  .topbar__right { width: 100%; }
  #search-input { flex: 1; min-width: 0; }
  .detail__title { font-size: 18px; }
  .dash-grid { grid-template-columns: repeat(2, 1fr); }
  .widget--span2, .widget--span4 { grid-column: span 2; }
}
@media (max-width: 480px) {
  .dash-grid { grid-template-columns: 1fr; }
  .widget--span2, .widget--span4 { grid-column: span 1; }
}
@media (max-width: 480px) {
  .kpis { grid-template-columns: 1fr 1fr; padding: var(--gap-2); }
  .brand__sub { display: none; }
}
  </style>
</head>
<body data-theme="light">
  <header class="topbar">
    <div class="topbar__left">
      <h1 class="brand">
        <span class="brand__mark">M&amp;C</span>
        <span class="brand__title">신사업실 주간회의록</span>
      </h1>
      <span class="brand__sub" id="last-updated">로딩 중…</span>
    </div>
    <div class="topbar__right">
      <select id="week-select" class="control" aria-label="주차 선택">
        <option value="all">전체 주차</option>
      </select>
      <input type="search" id="search-input" class="control" placeholder="키워드 검색…" aria-label="키워드 검색" />

  function detail(row, callbacks) {

      '<header class="detail__head">' +

/* ====== App Controller ====== */
(function (global) {
  'use strict';

  function $(id) { return document.getElementById(id); }

    var mm = ('0' + now.getMinutes()).slice(-2);
    label.textContent = '마지막 갱신 ' + hh + ':' + mm;
    label.classList.remove('is-pulse');
    void label.offsetWidth;
    label.classList.add('is-pulse');
    var srcLabel = { 'sheet': '구글시트', 'sample': '샘플 데이터', 'sample-fallback': '샘플(시트 연결 실패)' }[source] || source;

  function reload() {
    if (!state.config) return;

  function populateSelects(config) {

    var dept = $('f-department');

      }).join('');

    proj.innerHTML = opts(config.projects || ['기타']);

    auth.innerHTML = opts((config.team && config.team.members) || []);
  }

  function openModal(row) {
    state.editingId = row ? row._id : null;
    $('modal-title').textContent = row ? '회의록 수정' : '회의록 작성';
    $('modal-delete').hidden = !row;
    $('f-id').value = row ? row._id || '' : '';

    $('f-meeting_date').value = row ? (row.meeting_date || today) : today;
    $('f-next_meeting').value = row ? (row.next_meeting || '') : '';
    $('f-title').value = row ? (row.title || '') : '';
    var defaultProj = (state.config.projects || ['기타'])[0];
    var defaultAuthor = ((state.config.team && state.config.team.members) || [''])[0];
    var defaultDept = (state.config.departments || [''])[0];
    $('f-project_tag').value = row ? (row.project_tag || defaultProj) : defaultProj;
    $('f-department').value = row ? (row.department || '') : defaultDept;
    $('f-author').value = row ? (row.author || defaultAuthor) : defaultAuthor;
    $('f-attendees').value = row ? (row.attendees || '') : ((state.config.team && state.config.team.members) || []).join(', ');
    $('f-agenda_md').value = row ? (row.agenda_md || '') : '## 안건\n- ';
    $('f-decisions_md').value = row ? (row.decisions_md || '') : '## 결정사항\n- ';
    $('f-actions_md').value = row ? (row.actions_md || '') : '- [ ] ';
    $('f-note_md').value = row ? (row.note_md || '') : '';

  function saveModal() {
    var title = $('f-title').value.trim();
    var date = $('f-meeting_date').value;
    if (!title) { toast('회의명을 입력하세요', 2500); $('f-title').focus(); return; }
    if (!date) { toast('회의일자를 선택하세요', 2500); $('f-meeting_date').focus(); return; }

    var row = {
      _id: id,
      timestamp: new Date().toISOString(),
      meeting_date: date,
      week: '',
      title: title,
      project_tag: $('f-project_tag').value,
      department: $('f-department').value,
      author: $('f-author').value,
      attendees: $('f-attendees').value,
      agenda_md: $('f-agenda_md').value,
      decisions_md: $('f-decisions_md').value,
      actions_md: $('f-actions_md').value,
      next_meeting: $('f-next_meeting').value,
      note_md: $('f-note_md').value
    };

  function deleteFromModal() {

  function exportLocal() {

    var blob = new Blob([json], { type: 'application/json' });

    var a = document.createElement('a');

    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Export 완료 (' + rows.length + '건)', 2500);
